name: OSPO Compliance Scan

on:
  push:
    branches:
      - '__never__'  # Disabled: change to branch name(s) to enable (e.g., 'main', 'develop')

permissions:
  id-token: write
  contents: read

jobs:
  policy-scan:
    name: Scan sources for policy Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Ensure Yarn cache directory exists
        run: mkdir -p ~/.yarn/berry/cache

      - name: Checkout
        id: checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Run policy compliance scan
        uses: adi-innersource/shared-actions/policy-scan@policy-scan-v2
        env:
          BLACKDUCK_AUTH_TOKEN: ${{ secrets.BLACKDUCK_AUTH_TOKEN }}
          CLOUDSMITH_OSPO_USER: ${{ secrets.CLOUDSMITH_OSPO_USER }}
        with:
          exclude-paths: |
            docs
          blackduck-options: |
            --detect.excluded.detector.types=GIT
          catalog-info-path: .catalog-info/catalog-info.yaml
          snippet-matching: 'true'

  policy-collateral:
    name: Generate policy collateral
    runs-on: ubuntu-latest
    needs: policy-scan
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v5

      - name: Run generate OSPO Compliance documentation
        uses: adi-innersource/shared-actions/policy-collateral@policy-collateral-v2
        env:
          BLACKDUCK_AUTH_TOKEN: ${{ secrets.BLACKDUCK_AUTH_TOKEN }}
          AWS_REGION: ${{ secrets.PROD_LICENSE_AWS_REGION }}
          AWS_S3_BUCKET: ${{ secrets.PROD_LICENSE_AWS_BUCKET_NAME }}
          AWS_DEPLOY_ROLE: ${{ secrets.PROD_AWS_DEPLOY_ROLE }}
          CLOUDSMITH_OSPO_USER: ${{ secrets.CLOUDSMITH_OSPO_USER }}
        with:
          catalog-info-path: .catalog-info/catalog-info.yaml
