name: Sync from Open Source Upstream

on:
  schedule:
    # Runs every Wednesday at 8am UTC (11am Bucharest time)
    - cron: '0 8 * * 3'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not push changes)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote (open source)
        run: git remote add upstream https://github.com/analogdevicesinc/analog-attach.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Create or checkout sync branch
        run: |
          git fetch origin sync-open-source || true
          if git show-ref --verify --quiet refs/remotes/origin/sync-open-source; then
            git checkout sync-open-source
            git reset --hard origin/sync-open-source
          else
            git checkout -b sync-open-source
          fi

      - name: Check for new commits
        id: check
        run: |
          # Use git cherry to find commits not yet applied (by patch content)
          # + means needs to be applied, - means already applied
          NEW_COMMITS=$(git cherry HEAD upstream/main | grep -c '^+' || echo 0)
          echo "new_commits=$NEW_COMMITS" >> $GITHUB_OUTPUT
          echo "Found $NEW_COMMITS commits to sync"

      - name: Cherry-pick upstream commits
        if: steps.check.outputs.new_commits != '0'
        run: |
          # Get commits that need to be applied (marked with + by git cherry)
          # git cherry compares by patch content, not SHA - handles squashed histories
          COMMITS=$(git cherry HEAD upstream/main | grep '^+' | awk '{print $2}')

          for COMMIT in $COMMITS; do
            echo "Cherry-picking $COMMIT"
            git cherry-pick "$COMMIT" --allow-empty
          done

      - name: Push changes
        if: steps.check.outputs.new_commits != '0' && inputs.dry_run != true
        run: git push origin sync-open-source --force

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Upstream sync failed on ${new Date().toISOString().split('T')[0]}`;
            const body = `## Upstream Sync Failed

            The automatic sync from [analogdevicesinc/analog-attach](https://github.com/analogdevicesinc/analog-attach) failed.

            **Workflow run:** [View logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})

            ### Possible causes:
            - Merge conflicts between upstream and this repository
            - Network issues fetching from upstream
            - Permission issues pushing to this repository

            ### Resolution:
            1. Check the workflow logs for details
            2. If there are merge conflicts, resolve them manually:
               \`\`\`bash
               git fetch upstream
               git merge upstream/main
               # Resolve conflicts
               git push origin main
               \`\`\`

            /cc @Andreifabian-Pop_adi
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['sync-failure', 'automated']
            });
