name: Generate documentation

on:
  push:
    branches:
      - main
    tags:
      - v*.*.*
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-doc:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install pip packages
        working-directory: docs
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build doc
        working-directory: docs
        run: |
          make html SPHINXOPTS='-W --keep-going'

      - name: Store the generated doc
        uses: actions/upload-artifact@v4
        with:
          name: html
          path: docs/_build/html

  deploy-doc:
    runs-on: ubuntu-latest
    needs: build-doc
    if: |
      startsWith(github.ref, 'refs/tags/') ||
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'pull_request' && startsWith(github.event.pull_request.head.ref, 'afpop/ci'))
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: html
          path: ${{ runner.temp }}/site

      - name: Prepare gh-pages
        run: |
          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages
            git checkout -B gh-pages origin/gh-pages
          else
            git checkout --orphan gh-pages
            git reset --hard
          fi

          DOC_SRC="${RUNNER_TEMP}/site"

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            DOC_DEST="${{ github.ref_name }}"
          else
            DOC_DEST="."
          fi

          if [[ "$DOC_DEST" == "." ]]; then
            find . -mindepth 1 -maxdepth 1 ! -name ".git" ! -name "v*.*.*" -exec rm -rf {} +
            cp -r "${DOC_SRC}/." .
          else
            rm -rf "$DOC_DEST"
            mkdir -p "$DOC_DEST"
            cp -r "${DOC_SRC}/." "$DOC_DEST/"
          fi

          touch .nojekyll
          find . -name objects.inv -exec sh -c 'dirname "$1"' _ {} \; | cut -c 3- | sort -r | jq -Rn 'reduce inputs as $i ({}; .[$i] = if $i == "" then ["main", "unstable"] else [$i | split("/") | last, "release"] end )' > tags.json

      - name: Commit and push to gh-pages
        run: |
          git add . >> /dev/null
          git commit -m "deploy: ${GITHUB_SHA}" --allow-empty
          git push origin gh-pages:gh-pages
